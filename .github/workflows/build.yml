name: Build and Test
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'include/**'
      - 'examples/**'
      - 'test/**'
      - '**/Makefile'
      - '**/CMakeLists.txt'
      - '*.mk'
      - 'cmake/**'
      - '.github/workflows/build.yml'

  pull_request:
    paths:
      - 'src/**'
      - 'include/**'
      - 'examples/**'
      - 'test/**'
      - '**/Makefile'
      - '**/CMakeLists.txt'
      - '*.mk'
      - 'cmake/**'
      - '.github/workflows/build.yml'

jobs:
  build:
    name: GNU build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: macos-latest
            cc: clang
    env:
      CC: ${{ matrix.cc }}
      CFLAGS: -Os -Wall -Werror
      CSTANDARD: c99
      WEXTRA: 1
      FORTIFY: 3

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Build static library
        run: make static

      - name: Build shared library
        run: make shared

      - name: Compile solsys plugins
        run: make solsys

      - name: Build examples
        run: make examples

      - name: Build benchmarks
        run: make -C benchmark build

  build-freebsd:
    name: GNU build FreeBSD
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.0"
          prepare: |
            pkg install -y gmake curl devel/pkgconf
          run: |
            echo Building on FreeBSD $(uname -m)
            export CFLAGS=`pkg-config --cflags libcurl`
            export LDFLAGS=`pkg-config --libs libcurl`
            gmake static
            gmake shared

  build-cpp:
    name: GNU build C++ library
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: macos-latest
            cxx: clang++
    env:
      CXX: ${{ matrix.cxx }}
      CXXFLAGS: -Os -Wall -Werror
      WEXTRA: 1
      FORTIFY: 3

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Build static C++ library
        run: make static-cpp

      - name: Build shared C++ library
        run: make shared-cpp

      - name: Build C++ examples
        run: make -C examples/cpp

  build-mcu:
    name: GNU build embedded ARM
    needs: build
    runs-on: ubuntu-latest
    env:
      CC: arm-none-eabi-gcc
      # As an example, compile a static library for the RP2350 microcontroller
      CFLAGS: -mcpu=cortex-m33 -mthumb -mfloat-abi=hard -mfpu=fpv5-sp-d16 -Os -Wall -Werror
    steps:
      - uses: actions/checkout@v7

      - uses: carlosperate/arm-none-eabi-gcc-action@v1

      - name: Build static library
        run: make WITHOUT_LIBC=1 static

  build-examples:
    name: check examples
    needs: build-cpp
    runs-on: ubuntu-latest
    strategy:
      matrix:
        prog: [star, high-z, orbital, time, rise-set, moon]

    steps:
    - uses: actions/checkout@v7

    - name: Compile example-${{ matrix.prog }}.c
      run: |
        gcc -c -Wall -Werror -Iinclude examples/c99/example-${{matrix.prog }}.c

    - name: Compile example-${{ matrix.prog }}.cpp
      run: |
        g++ -c -Wall -Werror -Iinclude examples/cpp/example-${{ matrix.prog }}.cpp

  build-cmake:
    name: CMake build
    needs: build-cpp
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Configure CMake (Unix)
        if: runner.os != 'Windows'
        run: cmake -B build -DENABLE_CPP=ON -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=ON -DBUILD_BENCHMARK=ON

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DWITHOUT_CURL=ON -DENABLE_CPP=ON -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=ON -DBUILD_BENCHMARK=ON

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: cmake --build build --config Release

      - name: Install
        run: cmake --install build --prefix install

      - name: Check Installation (Unix)
        if: runner.os != 'Windows'
        run: |
          echo Installation contents:
          ls -la install/

      - name: Check Installation (Windows)
        if: runner.os == 'Windows'
        run: |
          echo Installation contents:
          dir install

  build-cmake-freebsd:
    name: CMake build on FreeBSD
    needs: build-cmake
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.0"
          usesh: true
          prepare: |
            pkg install -y cmake curl
          run: |
            echo Building on FreeBSD $(uname -m)
            cmake -B build
            cmake --build build
            cmake --install build --prefix install
            ls -la install/

  build-cmake-doc:
    name: CMake with Documentation (Ubuntu)
    runs-on: ubuntu-latest
    needs: build-cmake
    steps:
      - uses: actions/checkout@v7

      - name: Install doxygen
        run: |
          sudo apt-get update -q -y
          sudo apt-get install doxygen libcurl4-openssl-dev

      - name: Build HTML documentation
        run: |
          cmake -B build -DENABLE_CPP=ON -DBUILD_DOC=ON
          cmake --build build

      - name: Install docs
        run: |
          cmake --install build --prefix install
          ls -la install/

  install:
    name: install on ${{ matrix.os }}
    needs: build-cpp
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cc: g++
          - os: macos-latest
            cc: clang
    env:
      CC: ${{ matrix.cc }}
      ENABLE_CPP: 1
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update
            sudo apt-get install -y doxygen libcurl4-openssl-dev
          else
            brew upgrade
            brew install doxygen curl
          fi

      - name: Build distro
        run: make distro

      - name: Install to local prefix
        run: |
          make DESTDIR=$HOME/test-install install

  test:
    name: GNU test and coverage
    needs: build-cpp
    runs-on: ubuntu-latest
    env:
      CC: gcc
      CXX: g++
      CFLAGS: -O0
      ENABLE_CPP: 1
    steps:
    - uses: actions/checkout@v7

    - name: install dependencies
      run: |
        sudo apt-get update -q -y
        sudo apt-get install -y lcov libcurl4-openssl-dev

    - name: Run regression tests
      run: |
        ping -c 1 -W 3 www.iers.org || export OFFLINE=1
        make test

    - name: Generate test coverage
      run: make coverage

    - name: Upload coverage to Codecov.io
      uses: codecov/codecov-action@v7
      continue-on-error: true
      with:
        fail_ci_if_error: false
        flags: unittests
        name: codecov
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

    - name: Upload coverage to Coveralls.io
      continue-on-error: true
      uses: coverallsapp/github-action@v2

  test-arch:
    name: GNU test on Linux arches (offline)
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: armv7
            distro: ubuntu_latest
          - arch: aarch64
            distro: ubuntu_latest
          - arch: riscv64
            distro: ubuntu_latest
          - arch: s390x
            distro: ubuntu_latest
          - arch: ppc64le
            distro: ubuntu_latest
    steps:
      - uses: actions/checkout@v7
      - uses: uraimo/run-on-arch-action@v3
        name: Run regression tests
        with:
          arch: ${{ matrix.arch }}
          distro: ${{ matrix.distro }}
          install: |
            apt-get update -q -y
            apt-get install -q -y make gcc g++ gfortran libcurl4-openssl-dev libcurl4-openssl-dev
          run: |
            export ENABLE_CPP=1
            export OFFLINE=1
            make test

  test-macos:
    name: GNU test on MacOS (offline)
    needs: test
    runs-on: macos-latest
    env:
      ENABLE_CPP: 1
      OFFLINE: 1
    steps:
      - uses: actions/checkout@v7
      - name: Build and test on macOS
        run: make test

  test-cmake:
    name: CMake test (Ubuntu)
    needs: [ build-cmake, test ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

#     - name: Install libcalceph-dev
#        run: |
#           sudo apt-get update -q -y
#           sudo apt-get install -y libcalceph-dev

      - name: Install curl
        run: |
          sudo apt-get update -q -y
          sudo apt-get install -y libcurl4-openssl-dev

      - name: Build
        run: |
          cmake -B build -DENABLE_CPP=ON -DBUILD_TESTING=ON -DBUILD_SHARED_LIBS=ON -DBUILD_EXAMPLES=ON
          cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
